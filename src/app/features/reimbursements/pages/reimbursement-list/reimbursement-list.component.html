<div class="page-header">
  <div>
    <h1 class="title">Reembolsos</h1>
    <p class="subtitle">Gerencie suas solicitações de reembolso.</p>
  </div>
  <button class="btn-add" (click)="create()">
    <mat-icon>add_circle</mat-icon>
    <span>Inserir Reembolso</span>
  </button>
</div>

<div class="table-card">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 custom-table">

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Título </th>
      <td mat-cell *matCellDef="let element">
        <div class="cell-title">
          <span>{{ element.title }}</span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef> Valor </th>
      <td mat-cell *matCellDef="let element"> {{ element.amount | currency:'BRL' }} </td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Data </th>
      <td mat-cell *matCellDef="let element"> {{element.date | date:'dd/MM/yyyy'}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef class="status-column">
        <div class="filter-container">
          <div class="header-label" (click)="toggleDropdown()" cdkOverlayOrigin
            #origin="cdkOverlayOrigin">
            <span class="label-text">Status</span>
            <button class="filter-btn" [class.active]="activeFilter !== null">
            <mat-icon>filter_list</mat-icon>
            </button>
          </div>
          <ng-template cdkConnectedOverlay [cdkConnectedOverlayOrigin]="origin"
            [cdkConnectedOverlayOpen]="isDropdownOpen" (overlayOutsideClick)="isDropdownOpen = false" #overlayTemplate>
            <div class="dropdown-menu">
              <div class="dropdown-content">
                <button class="filter-option" (click)="applyFilter('PENDING')">
                  <span class="dot dot-amber"></span>
                  Pendente
                </button>

                <button class="filter-option" (click)="applyFilter('APPROVED')">
                  <span class="dot dot-emerald"></span>
                  Aprovado
                </button>

                <button class="filter-option" (click)="applyFilter('REJECTED')">
                  <span class="dot dot-slate"></span>
                  Rejeitado
                </button>

                <div class="divider">
                  <button class="btn-clear" (click)="clearFilter()">
                    Limpar Filtro
                  </button>
                </div>
              </div>
            </div>
          </ng-template>
        </div>
      </th>
      <td mat-cell *matCellDef="let element">
        <span [ngClass]="getStatusClass(element.status)">
          {{ getStatusLabel(element.status) }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="action-column">Ações</th>
      <td mat-cell *matCellDef="let element">
        @if(element.status === 'PENDING') {
        <div class="actions-container">
          <button mat-stroked-button class="btn btn-approve" (click)="approve(element.id)">Aprovar</button>
          <button mat-stroked-button class="btn btn-reject" (click)="reject(element.id)">Rejeitar</button>
        </div>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
